<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🐍 SNAKE</h1>
        <div class="score-board">
            <div class="score-item">
                <span class="label">Score</span>
                <span id="score" class="value">0</span>
            </div>
            <div class="score-item">
                <span class="label">Best</span>
                <span id="best" class="value">0</span>
            </div>
        </div>
        <div class="game-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="overlay" class="overlay">
                <div class="overlay-content">
                    <h2 id="overlay-title">🐍 SNAKE</h2>
                    <p>Enter your name to start</p>
                    <div id="name-input-group">
                        <input type="text" id="name-input" placeholder="Your name" maxlength="12" autocomplete="off">
                        <button id="start-btn" class="btn primary">Start Game</button>
                    </div>
                    <p id="overlay-score" class="hidden"></p>
                    <button id="restart-btn" class="btn primary hidden">Play Again</button>
                </div>
            </div>
        </div>
        <div class="leaderboard">
            <div class="leaderboard-header">
                <h2>Leaderboard</h2>
                <button id="show-all-btn" class="btn small">Show All</button>
            </div>
            <div id="leaderboard-content">
                <p class="loading">Loading...</p>
            </div>
        </div>
        <div class="controls">
            <p>W A S D to move</p>
        </div>
        <div class="dpad">
            <button class="dpad-btn" data-dir="up">▲</button>
            <div class="dpad-row">
                <button class="dpad-btn" data-dir="left">◀</button>
                <button class="dpad-btn" data-dir="down">▼</button>
                <button class="dpad-btn" data-dir="right">▶</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
